name: uncertainty-calibration
version: "0.1.0"
description: >
  An RL environment for training LLMs to express calibrated confidence.
  The agent answers questions and rates its own confidence. The environment
  rewards honest uncertainty — confident when correct, uncertain when wrong.

tasks:
  - id: task1_facts
    name: Clear-Cut Facts
    difficulty: easy
    description: Binary know/don't-know questions with clear answers.
  - id: task2_partial
    name: Shades of Grey
    difficulty: medium
    description: Questions with partial, outdated, or contested knowledge.
  - id: task3_traps
    name: Confidence Traps
    difficulty: hard
    description: Misconceptions and trick questions that trigger overconfidence.

action_space:
  type: object
  properties:
    answer:
      type: string
      description: The agent's answer to the question
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Agent's self-assessed confidence
    uncertainty_type:
      type: string
      enum: [none, partial, full, outdated, contested]

observation_space:
  type: object
  properties:
    question:
      type: string
    question_category:
      type: string
    is_correct:
      type: boolean
    reward:
      type: number
    done:
      type: boolean
    feedback:
      type: string

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
